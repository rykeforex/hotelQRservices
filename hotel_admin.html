<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUORVA Hotel Admin Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --gold: #c9a227;
      --gold-soft: rgba(201, 162, 39, 0.16);
      --gold-ring: rgba(201, 162, 39, 0.28);
      --bg: #f7f5ef;
      --panel: rgba(255,255,255,0.86);
      --panel-strong: #ffffff;
      --text: #171512;
      --muted: #716d64;
      --line: rgba(33, 28, 18, 0.1);
      --shadow: 0 22px 60px rgba(52, 44, 25, 0.1);
      --danger: #b42318;
      --success: #12805c;
      --info: #2563eb;
    }
    html.dark {
      --bg: #090907;
      --panel: rgba(18,18,16,0.84);
      --panel-strong: #11110f;
      --text: #f8f4e8;
      --muted: #aaa395;
      --line: rgba(255,255,255,0.1);
      --shadow: 0 24px 70px rgba(0,0,0,0.42);
      --gold-soft: rgba(201, 162, 39, 0.18);
    }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at 8% 0%, rgba(201,162,39,0.11), transparent 34%),
        linear-gradient(135deg, var(--bg), var(--bg));
      transition: background 0.25s ease, color 0.25s ease;
    }
    .serif { font-family: "Cormorant Garamond", serif; }
    .gold { color: var(--gold); }
    .glass {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover { transform: translateY(-2px); border-color: var(--gold-ring); box-shadow: 0 18px 44px rgba(201,162,39,0.12); }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      min-height: 2.65rem;
      border-radius: 999px;
      padding: 0.65rem 1rem;
      font-weight: 700;
      font-size: 0.86rem;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      color: var(--text);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: var(--gold-ring); }
    .btn.gold-btn { background: linear-gradient(135deg, #b88b18, #e3c873); color: #17120a; border-color: rgba(201,162,39,0.42); }
    .btn.danger-btn { color: var(--danger); }
    .input, select, textarea {
      width: 100%;
      min-height: 2.75rem;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0.75rem 0.9rem;
      background: var(--panel-strong);
      color: var(--text);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }
    textarea { min-height: 7rem; resize: vertical; }
    .input:focus, select:focus, textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 4px var(--gold-soft); }
    .nav-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0.9rem;
      border-radius: 12px;
      color: var(--muted);
      font-size: 0.9rem;
      transition: background 0.18s ease, color 0.18s ease;
    }
    .nav-btn.active, .nav-btn:hover { background: var(--gold-soft); color: var(--text); }
    .nav-btn.active i { color: var(--gold); }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0.25rem 0.6rem;
      font-size: 0.72rem;
      font-weight: 800;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      white-space: nowrap;
    }
    .status-active, .status-delivered, .status-sent { color: var(--success); background: rgba(18,128,92,0.12); }
    .status-locked, .status-suspended, .status-failed { color: var(--danger); background: rgba(180,35,24,0.12); }
    .status-queued, .status-pending { color: #a15c00; background: rgba(201,162,39,0.14); }
    .table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid var(--line); }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { padding: 0.9rem; text-align: left; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 800; }
    tr:last-child td { border-bottom: 0; }
    .skeleton {
      position: relative;
      overflow: hidden;
      background: linear-gradient(90deg, rgba(201,162,39,0.08), rgba(255,255,255,0.18), rgba(201,162,39,0.08));
      background-size: 200% 100%;
      animation: shimmer 1.3s infinite linear;
      border-radius: 14px;
      min-height: 5rem;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .section { display: none; animation: rise 0.28s ease both; }
    .section.active { display: block; }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 1rem; background: rgba(0,0,0,0.45); z-index: 60; }
    .modal.open { display: flex; }
    .modal-panel { width: min(920px, 100%); max-height: 90vh; overflow: auto; border-radius: 22px; }
    .chart-bar { height: 0.65rem; border-radius: 999px; background: var(--gold-soft); overflow: hidden; }
    .chart-bar span { display: block; height: 100%; background: linear-gradient(90deg, #b88b18, #e3c873); border-radius: inherit; }
    .mobile-top { display: none; }
    @media (max-width: 1040px) {
      #sidebar { position: fixed; inset: 0 auto 0 0; width: min(86vw, 320px); z-index: 50; transform: translateX(-105%); transition: transform 0.22s ease; }
      body.sidebar-open #sidebar { transform: translateX(0); }
      body.sidebar-open::after { content: ''; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 40; }
      .mobile-top { display: flex; }
      #mainShell { margin-left: 0; }
    }
    @media (max-width: 720px) {
      .metric-grid { grid-template-columns: 1fr 1fr !important; }
      .toolbar { flex-direction: column; align-items: stretch !important; }
      .page-pad { padding: 1rem !important; }
      .btn { width: 100%; }
    }
    @media (max-width: 430px) {
      .metric-grid { grid-template-columns: 1fr !important; }
      h1 { font-size: 2rem !important; }
    }
  </style>
</head>
<body>
  <main id="appScreen" class="hidden min-h-screen">
    <aside id="sidebar" class="glass h-screen p-4 overflow-y-auto" style="position:fixed;left:0;top:0;width:286px;">
      <div class="flex items-center justify-between mb-6">
        <div>
          <p class="text-xs uppercase tracking-[0.24em] gold font-bold">QUORVA</p>
          <h2 class="serif text-2xl">Hotel Admin</h2>
        </div>
        <button class="btn lg:hidden" id="closeSidebar" title="Close menu"><i class="fas fa-times"></i></button>
      </div>
      <nav id="nav" class="space-y-1"></nav>
      <div class="mt-6 pt-5 border-t" style="border-color:var(--line);">
        <button id="themeToggle" class="btn w-full mb-2" type="button"><i class="fas fa-moon"></i> Theme</button>
        <button id="logoutBtn" class="btn w-full danger-btn" type="button"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </aside>

    <div id="mainShell" style="margin-left:286px;">
      <div class="mobile-top items-center justify-between p-4">
        <button class="btn" id="openSidebar" title="Open menu"><i class="fas fa-bars"></i></button>
        <strong class="serif text-xl">Hotel Admin</strong>
      </div>
      <header class="page-pad p-6 lg:p-8">
        <div class="toolbar flex items-center justify-between gap-4">
          <div>
            <p id="hotelNameLabel" class="text-xs uppercase tracking-[0.22em] gold font-bold">Hotel</p>
            <h1 id="pageTitle" class="serif text-5xl">Dashboard</h1>
          </div>
          <div class="relative w-full max-w-xl">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2" style="color:var(--muted);"></i>
            <input id="globalSearch" class="input pl-11" type="search" placeholder="Search users, departments, roles, logs, reports">
            <div id="searchResults" class="hidden glass absolute left-0 right-0 mt-2 rounded-2xl p-3 z-30"></div>
          </div>
        </div>
      </header>
      <div id="sections" class="page-pad px-6 lg:px-8 pb-8"></div>
      <footer class="px-6 lg:px-8 pb-8 text-center text-xs" style="color:var(--muted);">Powered by PeerLoom Technologies</footer>
    </div>
  </main>

  <div id="modal" class="modal">
    <div class="modal-panel glass p-5">
      <div class="flex items-start justify-between gap-4 mb-4">
        <div>
          <p id="modalKicker" class="text-xs uppercase tracking-[0.2em] gold font-bold"></p>
          <h2 id="modalTitle" class="serif text-3xl"></h2>
        </div>
        <button id="modalClose" class="btn" title="Close"><i class="fas fa-times"></i></button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
  'use strict';
  const API_BASE_URL =
    window.location.protocol === 'file:' || !window.location.hostname ||
    window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3000'
      : 'https://hotelqrservices.onrender.com';

  const state = {
    token: localStorage.getItem('hotelAdminToken'),
    user: JSON.parse(localStorage.getItem('hotelAdminUser') || 'null'),
    page: 'dashboard',
    usersPage: 1,
    auditPage: 1,
    cache: { users: [], roles: [], departments: [], shifts: [] }
  };

  const navItems = [
    ['dashboard', 'fa-gauge-high', 'Dashboard'],
    ['users', 'fa-users-gear', 'User Management'],
    ['roles', 'fa-user-shield', 'Role Management'],
    ['departments', 'fa-building-user', 'Departments'],
    ['performance', 'fa-chart-line', 'Staff Performance'],
    ['shifts', 'fa-business-time', 'Shifts'],
    ['audit', 'fa-clipboard-list', 'Audit Logs'],
    ['notifications', 'fa-bell', 'Notifications'],
    ['reports', 'fa-file-export', 'Reports'],
    ['settings', 'fa-sliders', 'Hotel Settings'],
    ['security', 'fa-shield-halved', 'Security Center']
  ];

  const permissions = [
    'View Requests', 'Complete Requests', 'Edit Requests', 'Delete Requests', 'Export Reports',
    'Manage Staff', 'Manage Departments', 'View Analytics', 'Manage Settings'
  ];

  const $ = id => document.getElementById(id);
  const esc = value => String(value ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const fmt = value => value ? new Date(value).toLocaleString() : 'Never';
  const badge = value => `<span class="badge status-${esc(String(value || '').toLowerCase())}">${esc(value || 'Unknown')}</span>`;

  async function api(endpoint, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
    if (state.token) headers.Authorization = `Bearer ${state.token}`;
    const res = await fetch(API_BASE_URL + endpoint, { ...options, headers });
    const text = await res.text();
    let data = {};
    try {
      data = text ? JSON.parse(text) : {};
    } catch (err) {
      data = { error: 'Invalid server response' };
    }

    if (!res.ok) {
      if (res.status === 401 || res.status === 403) {
        clearSession(`Authentication expired or not authorized (${res.status}).`);
      }
      throw new Error(data.error || `Request failed (${res.status})`);
    }

    return data;
  }

  function clearSession(message) {
    localStorage.removeItem('hotelAdminToken');
    localStorage.removeItem('hotelAdminUser');
    state.token = null;
    state.user = null;
    if (message) console.warn(message);
    window.location.href = 'index.html';
  }

  function restoreSession() {
    const savedUser = localStorage.getItem('hotelAdminUser');
    if (!state.user && savedUser) {
      try {
        state.user = JSON.parse(savedUser);
      } catch (err) {
        state.user = null;
      }
    }
  }

  function skeleton(count = 4) {
    return `<div class="grid gap-4" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));">${Array.from({length: count}, () => '<div class="skeleton"></div>').join('')}</div>`;
  }

  function emptyState(title, detail) {
    return `<div class="card p-8 text-center">
      <div class="mx-auto h-12 w-12 rounded-full grid place-items-center mb-3" style="background:var(--gold-soft);"><i class="fas fa-inbox gold"></i></div>
      <h3 class="serif text-2xl">${esc(title)}</h3>
      <p class="text-sm mt-1" style="color:var(--muted);">${esc(detail)}</p>
    </div>`;
  }

  function errorState(message, retry) {
    return `<div class="card p-6">
      <p style="color:var(--danger);" class="font-semibold"><i class="fas fa-circle-exclamation mr-2"></i>${esc(message)}</p>
      <button class="btn mt-4" onclick="${retry}"><i class="fas fa-rotate"></i> Retry</button>
    </div>`;
  }

  function setSectionLoading(id) { $(id).innerHTML = skeleton(); }

  function buildShell() {
    $('nav').innerHTML = navItems.map(([id, icon, label]) => `
      <button class="nav-btn ${state.page === id ? 'active' : ''}" data-page="${id}">
        <i class="fas ${icon} w-5"></i><span>${label}</span>
      </button>`).join('');
    $('sections').innerHTML = navItems.map(([id, , label]) => `<section id="section-${id}" class="section ${state.page === id ? 'active' : ''}" aria-label="${label}"></section>`).join('');
    document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', () => navigate(btn.dataset.page)));
  }

  function navigate(page) {
    state.page = page;
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.page === page));
    document.querySelectorAll('.section').forEach(section => section.classList.toggle('active', section.id === `section-${page}`));
    $('pageTitle').textContent = navItems.find(item => item[0] === page)?.[2] || 'Hotel Admin';
    document.body.classList.remove('sidebar-open');
    loaders[page]();
  }

  function openModal(kicker, title, body) {
    $('modalKicker').textContent = kicker;
    $('modalTitle').textContent = title;
    $('modalBody').innerHTML = body;
    $('modal').classList.add('open');
  }

  function closeModal() { $('modal').classList.remove('open'); }

  async function loadReferenceData() {
    const [roles, departments, shifts, users] = await Promise.all([
      api('/api/hotel-admin/roles'),
      api('/api/hotel-admin/departments'),
      api('/api/hotel-admin/shifts'),
      api('/api/hotel-admin/users?limit=50')
    ]);
    state.cache.roles = roles;
    state.cache.departments = departments;
    state.cache.shifts = shifts;
    state.cache.users = users.users || [];
  }

  async function loadDashboard() {
    const section = $('section-dashboard');
    setSectionLoading('section-dashboard');
    try {
      const [data, activity] = await Promise.all([api('/api/hotel-admin/dashboard'), api('/api/hotel-admin/activity')]);
      $('hotelNameLabel').textContent = data.hotelName || 'Hotel';
      const hour = new Date().getHours();
      const greeting = hour < 12 ? 'Good Morning' : hour < 18 ? 'Good Afternoon' : 'Good Evening';
      const metrics = [
        ['Total Staff', data.metrics.totalStaff, 'fa-users'],
        ['Online Staff', data.metrics.onlineStaff, 'fa-signal'],
        ['Offline Staff', data.metrics.offlineStaff, 'fa-plug-circle-xmark'],
        ['Active Departments', data.metrics.activeDepartments, 'fa-building'],
        ['Pending Requests', data.metrics.pendingRequests, 'fa-hourglass-half'],
        ['Completed Today', data.metrics.requestsCompletedToday, 'fa-circle-check'],
        ['Avg Response', data.metrics.averageResponseTime, 'fa-clock'],
        ['Active Shifts', data.metrics.activeShifts, 'fa-business-time'],
        ['New Users This Month', data.metrics.newUsersThisMonth, 'fa-user-plus'],
        ['Locked Accounts', data.metrics.lockedAccounts, 'fa-lock'],
        ['Recent Logins', data.metrics.recentLogins, 'fa-right-to-bracket']
      ];
      section.innerHTML = `
        <div class="glass rounded-[26px] p-6 mb-6">
          <p class="text-sm gold font-bold">${greeting}, ${esc(data.greetingName || 'Admin')}</p>
          <h2 class="serif text-4xl mt-1">Executive command center</h2>
        </div>
        <div class="metric-grid grid gap-4 mb-6" style="grid-template-columns:repeat(auto-fit,minmax(170px,1fr));">
          ${metrics.map(item => `<div class="card p-4">
            <i class="fas ${item[2]} gold"></i>
            <div class="text-3xl font-light mt-3">${esc(item[1])}</div>
            <div class="text-xs uppercase tracking-wider mt-1" style="color:var(--muted);">${esc(item[0])}</div>
          </div>`).join('')}
        </div>
        <div class="grid gap-5" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));">
          <div class="card p-5">
            <h3 class="serif text-2xl mb-4">Live Activity Feed</h3>
            ${activity.length ? `<div class="space-y-3">${activity.slice(0, 12).map(renderActivity).join('')}</div>` : emptyState('No activity yet', 'Audit events will appear here as staff actions occur.')}
          </div>
          <div class="card p-5">
            <h3 class="serif text-2xl mb-4">Recent Logins</h3>
            ${data.recentLogins.length ? `<div class="space-y-3">${data.recentLogins.map(login => `<div class="flex items-center justify-between gap-3">
              <div><div class="font-semibold">${esc(login.full_name)}</div><div class="text-xs" style="color:var(--muted);">${esc(login.email)}</div></div>
              <div class="text-xs text-right" style="color:var(--muted);">${fmt(login.last_login_at)}</div>
            </div>`).join('')}</div>` : emptyState('No recent logins', 'Successful admin logins will appear here.')}
          </div>
        </div>`;
    } catch (err) {
      section.innerHTML = errorState(err.message, 'loadDashboard()');
    }
  }

  function renderActivity(item) {
    return `<div class="flex gap-3">
      <div class="h-9 w-9 rounded-full grid place-items-center shrink-0" style="background:var(--gold-soft);"><i class="fas fa-bolt gold text-sm"></i></div>
      <div>
        <div class="font-semibold">${esc((item.action || '').replaceAll('_', ' '))}</div>
        <div class="text-xs" style="color:var(--muted);">${esc(item.user_name || 'System')} · ${fmt(item.created_at)}</div>
      </div>
    </div>`;
  }

  async function loadUsers() {
    const section = $('section-users');
    setSectionLoading('section-users');
    try {
      await loadReferenceData();
      const data = await api(`/api/hotel-admin/users?page=${state.usersPage}&limit=12`);
      section.innerHTML = `
        <div class="toolbar flex items-center justify-between gap-3 mb-4">
          <div class="flex gap-2 flex-wrap">
            <input id="userSearch" class="input" style="max-width:320px;" placeholder="Search users">
            <select id="userStatus" style="max-width:190px;"><option value="">All statuses</option><option>active</option><option>suspended</option><option>locked</option></select>
          </div>
          <button class="btn gold-btn" onclick="showUserForm()"><i class="fas fa-user-plus"></i> Create User</button>
        </div>
        <div id="usersTable">${renderUsersTable(data)}</div>`;
      $('userSearch').addEventListener('input', debounce(filterUsers, 350));
      $('userStatus').addEventListener('change', filterUsers);
    } catch (err) {
      section.innerHTML = errorState(err.message, 'loadUsers()');
    }
  }

  function renderUsersTable(data) {
    if (!data.users.length) return emptyState('No users found', 'Create staff accounts to manage hotel operations.');
    return `<div class="table-wrap"><table><thead><tr><th>User</th><th>Department</th><th>Role</th><th>Shift</th><th>Status</th><th>Last Login</th><th>Actions</th></tr></thead><tbody>
      ${data.users.map(user => `<tr>
        <td><div class="flex items-center gap-3">
          <div class="h-10 w-10 rounded-full grid place-items-center overflow-hidden" style="background:var(--gold-soft);">${user.profilePhotoUrl ? `<img src="${esc(user.profilePhotoUrl)}" alt="" class="h-full w-full object-cover">` : `<span class="gold font-bold">${esc((user.fullName || '?').slice(0,1))}</span>`}</div>
          <div><div class="font-semibold">${esc(user.fullName)}</div><div class="text-xs" style="color:var(--muted);">${esc(user.employeeId || user.email)}</div></div>
        </div></td>
        <td>${esc(user.department || 'Unassigned')}</td>
        <td>${esc(user.role || 'Unassigned')}</td>
        <td>${esc(user.shift || 'Unassigned')}</td>
        <td>${badge(user.accountStatus)}</td>
        <td>${fmt(user.lastLogin)}</td>
        <td><div class="flex gap-2 flex-wrap">
          <button class="btn" onclick="showUserProfile(${user.id})" title="View profile"><i class="fas fa-eye"></i></button>
          <button class="btn" onclick="showUserForm(${user.id})" title="Edit user"><i class="fas fa-pen"></i></button>
          <button class="btn" onclick="userAction(${user.id}, '${user.accountStatus === 'locked' ? 'unlock' : 'lock'}')" title="${user.accountStatus === 'locked' ? 'Unlock' : 'Lock'} account"><i class="fas ${user.accountStatus === 'locked' ? 'fa-lock-open' : 'fa-lock'}"></i></button>
          <button class="btn" onclick="userAction(${user.id}, '${user.accountStatus === 'suspended' ? 'activate' : 'suspend'}')" title="${user.accountStatus === 'suspended' ? 'Activate' : 'Suspend'}"><i class="fas ${user.accountStatus === 'suspended' ? 'fa-user-check' : 'fa-user-slash'}"></i></button>
          <button class="btn" onclick="userAction(${user.id}, 'force_password_reset')" title="Force password reset"><i class="fas fa-key"></i></button>
          <button class="btn danger-btn" onclick="deleteUser(${user.id})" title="Delete user"><i class="fas fa-trash"></i></button>
        </div></td>
      </tr>`).join('')}
    </tbody></table></div>
    <div class="flex items-center justify-between mt-4">
      <button class="btn" ${data.page <= 1 ? 'disabled' : ''} onclick="state.usersPage--; loadUsers();"><i class="fas fa-chevron-left"></i> Previous</button>
      <span class="text-sm" style="color:var(--muted);">Page ${data.page} · ${data.total} users</span>

          <div class="card p-5"><i class="fas fa-lock gold"></i><div class="text-3xl mt-3">${data.lockedAccounts.length}</div><div class="text-xs uppercase" style="color:var(--muted);">Locked Accounts</div></div>
        </div>
        <div class="grid gap-5" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));">
          ${securityPanel('Locked Accounts', data.lockedAccounts.map(u => `${u.full_name} · ${u.email}`))}
          ${securityPanel('Recent Password Changes', data.recentPasswordChanges.map(x => `${x.full_name || 'System'} · ${fmt(x.created_at)}`))}
          ${securityPanel('Suspicious Activity', data.suspiciousActivity.map(x => `${x.action} · ${x.ip_address || ''}`))}
          ${securityPanel('Recent Devices', data.recentDevices.map(x => `${x.device} · ${x.events} events`))}
          ${securityPanel('Recent IP Addresses', data.recentIpAddresses.map(x => `${x.ip_address} · ${x.events} events`))}
        </div>`;
    } catch (err) { section.innerHTML = errorState(err.message, 'loadSecurity()'); }
  }

  function securityPanel(title, rows) {
    return `<div class="card p-5"><h3 class="serif text-2xl mb-3">${esc(title)}</h3>${rows.length ? `<div class="space-y-2">${rows.map(row => `<div class="card p-3 text-sm">${esc(row)}</div>`).join('')}</div>` : emptyState(`No ${title.toLowerCase()}`, 'Nothing has been recorded for this category.')}</div>`;
  }

  const loaders = { dashboard: loadDashboard, users: loadUsers, roles: loadRoles, departments: loadDepartments, performance: loadPerformance, shifts: loadShifts, audit: loadAudit, notifications: loadNotifications, reports: loadReports, settings: loadSettings, security: loadSecurity };

  function debounce(fn, delay) {
    let timer;
    return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
  }

  async function globalSearch() {
    const q = $('globalSearch').value.trim();
    if (!q) { $('searchResults').classList.add('hidden'); return; }
    const data = await api(`/api/hotel-admin/search?q=${encodeURIComponent(q)}`);
    const groups = Object.entries(data).filter(([,rows]) => rows.length);
    $('searchResults').innerHTML = groups.length ? groups.map(([name, rows]) => `<div class="mb-3"><div class="text-xs uppercase gold font-bold mb-1">${esc(name)}</div>${rows.map(row => `<button class="w-full text-left p-2 rounded-lg hover:bg-[var(--gold-soft)]"><strong>${esc(row.label)}</strong><div class="text-xs" style="color:var(--muted);">${esc(row.detail || '')}</div></button>`).join('')}</div>`).join('') : '<div class="p-3 text-sm" style="color:var(--muted);">No results found</div>';
    $('searchResults').classList.remove('hidden');
  }

  async function boot() {
    buildShell();
    $('modalClose').addEventListener('click', closeModal);
    $('modal').addEventListener('click', event => { if (event.target.id === 'modal') closeModal(); });
    $('openSidebar').addEventListener('click', () => document.body.classList.add('sidebar-open'));
    $('closeSidebar').addEventListener('click', () => document.body.classList.remove('sidebar-open'));
    $('themeToggle').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      document.documentElement.classList.toggle('light');
      localStorage.setItem('hotelAdminTheme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });
    if (localStorage.getItem('hotelAdminTheme') === 'dark') {
      document.documentElement.classList.add('dark');
      document.documentElement.classList.remove('light');
    }
    $('logoutBtn').addEventListener('click', async () => { try { await api('/api/auth/hotel-admin/logout', { method: 'POST' }); } catch (e) {} clearSession(); });
    $('globalSearch').addEventListener('input', debounce(globalSearch, 300));

    restoreSession();

    if (!state.token) {
      clearSession('No admin session found. Redirecting to login.');
      return;
    }

    try {
      const me = await api('/api/hotel-admin/me');
      state.user = me.user;
      $('appScreen').classList.remove('hidden');
      navigate('dashboard');
    } catch (err) {
      clearSession();
    }
  }

  boot();
  </script>
</body>
</html>
