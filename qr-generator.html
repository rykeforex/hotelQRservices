<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUXE Hotel · QR Code Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .qr-card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: transform 0.2s;
    }
    .qr-card:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-8">
    <div class="text-center mb-8">
      <i class="fas fa-hotel text-4xl text-[#b49450]"></i>
      <h1 class="text-2xl font-semibold mt-2 text-gray-800">QR Code Generator</h1>
      <p class="text-sm text-gray-500">Generate QR codes for hotel rooms</p>
    </div>

    <!-- Single QR Generator -->
    <div class="qr-card p-6 mb-8">
      <h2 class="text-lg font-medium text-gray-800 mb-4">Generate Single Room QR</h2>
      <div class="flex gap-4 items-end">
        <div class="flex-1">
          <label class="block text-sm font-medium text-gray-700 mb-1">Room Number</label>
          <input type="text" id="singleRoom" placeholder="e.g., 242" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#b49450] focus:border-transparent">
        </div>
        <button onclick="generateSingleQR()" class="bg-[#b49450] hover:bg-[#a08040] text-white px-6 py-3 rounded-xl transition">
          <i class="fas fa-qrcode mr-2"></i>Generate
        </button>
      </div>
      <div id="singleQRResult" class="mt-6 text-center hidden">
        <div id="singleQRCanvas" class="inline-block p-4 bg-white rounded-xl border"></div>
        <p class="mt-3 text-sm text-gray-600">Scan to open: <span class="font-medium" id="singleRoomDisplay"></span></p>
        <p class="text-xs text-gray-400 mt-1">URL: <code class="bg-gray-100 px-2 py-1 rounded" id="singleURL"></code></p>
      </div>
    </div>

    <!-- Bulk QR Generator -->
    <div class="qr-card p-6">
      <h2 class="text-lg font-medium text-gray-800 mb-4">Generate Multiple Room QR Codes</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Start Room</label>
          <input type="number" id="startRoom" value="100" class="w-full p-3 border border-gray-200 rounded-xl">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">End Room</label>
          <input type="number" id="endRoom" value="120" class="w-full p-3 border border-gray-200 rounded-xl">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Floor Prefix</label>
          <input type="text" id="floorPrefix" value="1" class="w-full p-3 border border-gray-200 rounded-xl" placeholder="e.g., 1 for floor 1">
        </div>
        <div class="flex items-end">
          <button onclick="generateBulkQRs()" class="w-full bg-[#b49450] hover:bg-[#a08040] text-white px-6 py-3 rounded-xl transition">
            <i class="fas fa-layer-group mr-2"></i>Generate All
          </button>
        </div>
      </div>
      <div id="bulkQRGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6"></div>
    </div>

    <!-- Print Button -->
    <div class="text-center mt-8">
      <button onclick="window.print()" class="bg-gray-800 hover:bg-gray-900 text-white px-6 py-3 rounded-xl transition">
        <i class="fas fa-print mr-2"></i>Print All QR Codes
      </button>
    </div>
  </div>

  <!-- QRCode.js library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script>
    const BASE_URL = window.location.origin;

    function generateSingleQR() {
      const room = document.getElementById('singleRoom').value.trim();
      if (!room) {
        alert('Please enter a room number');
        return;
      }

      const url = `${BASE_URL}/index.html?room=${room}`;
      
      document.getElementById('singleQRResult').classList.remove('hidden');
      document.getElementById('singleRoomDisplay').textContent = room;
      document.getElementById('singleURL').textContent = url;
      
      const canvas = document.getElementById('singleQRCanvas');
      canvas.innerHTML = '';
      
      QRCode.toCanvas(document.createElement('canvas'), url, {
        width: 200,
        margin: 2,
        color: {
          dark: '#1e1e2f',
          light: '#ffffff'
        }
      }, function(err, canvas) {
        if (err) {
          console.error(err);
          return;
        }
        canvas.style.width = '100%';
        canvas.style.height = 'auto';
        canvas.className = 'max-w-[200px]';
        canvas.id = 'qr-canvas-single';
        document.getElementById('singleQRCanvas').appendChild(canvas);
      });
    }

    function generateBulkQRs() {
      const start = parseInt(document.getElementById('startRoom').value) || 100;
      const end = parseInt(document.getElementById('endRoom').value) || 120;
      const prefix = document.getElementById('floorPrefix').value || '';
      
      const grid = document.getElementById('bulkQRGrid');
      grid.innerHTML = '';

      for (let i = start; i <= end; i++) {
        const room = prefix + i;
        const url = `${BASE_URL}/index.html?room=${room}`;
        
        const card = document.createElement('div');
        card.className = 'qr-card p-4 text-center';
        card.innerHTML = `
          <div id="qr-${room}" class="mb-2"></div>
          <div class="font-medium text-gray-800">Room ${room}</div>
          <div class="text-xs text-gray-400 mt-1">${url}</div>
        `;
        grid.appendChild(card);

        QRCode.toCanvas(document.createElement('canvas'), url, {
          width: 128,
          margin: 1,
          color: {
            dark: '#1e1e2f',
            light: '#ffffff'
          }
        }, function(err, canvas) {
          if (err) return;
          canvas.style.width = '100%';
          canvas.style.height = 'auto';
          document.getElementById(`qr-${room}`).appendChild(canvas);
        });
      }
    }

    // Generate some default QRs on load
    window.addEventListener('load', () => {
      document.getElementById('startRoom').value = '1';
      document.getElementById('endRoom').value = '1';
    });
  </script>
</body>
</html>
