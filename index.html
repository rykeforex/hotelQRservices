<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUORVA — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #E2C47A;
      --gold-pale: #F0DFA0;
      --gold-dim: rgba(201,168,76,0.18);
      --gold-glow: rgba(201,168,76,0.32);
      --cream: #FDFAF4;
      --ivory: #F7F2E8;
      --charcoal: #1C1A17;
      --charcoal-soft: #3A3630;
      --muted: #8A8070;
      --error: #B3492F;
    }

    body {
      min-height: 100vh;
      background-color: var(--cream);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.13) 0%, transparent 70%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9A84C' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      font-family: 'Montserrat', sans-serif;
      color: var(--charcoal);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes lineExpand {
      from { width: 0; opacity: 0; }
      to   { width: 72px; opacity: 1; }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .portal-wrapper {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border-radius: 28px;
      border: 1px solid rgba(201,168,76,0.25);
      padding: 56px 48px 44px;
      box-shadow:
        0 4px 24px rgba(180,150,60,0.10),
        0 1px 3px rgba(180,150,60,0.08),
        0 32px 80px rgba(100,80,20,0.07);
      animation: fadeInUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInUp 0.7s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    .system-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
    }

    h1.brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(46px, 9vw, 58px);
      font-weight: 300;
      line-height: 1;
      letter-spacing: 0.04em;
      color: var(--charcoal);
    }
    h1.brand em {
      font-style: italic;
      color: var(--gold);
      font-weight: 600;
    }

    .powered-by {
      margin-top: 10px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .powered-by span {
      color: var(--gold);
      font-weight: 600;
    }

    .gold-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 24px auto 18px;
    }
    .gold-divider span {
      display: block;
      height: 1px;
      width: 56px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: lineExpand 0.8s 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    .gold-divider .diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
      opacity: 0.85;
    }

    .hotel-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: var(--charcoal-soft);
      letter-spacing: 0.02em;
    }

    /* ---------------- FORM ---------------- */

    form {
      animation: fadeInUp 0.7s 0.22s cubic-bezier(0.22,1,0.36,1) both;
    }

    .field-group {
      margin-bottom: 22px;
    }

    .field-label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 9px;
    }

    .field-input-wrap {
      position: relative;
    }

    .field-input-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
      transition: stroke 0.25s ease;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px 14px 44px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--charcoal);
      background: var(--ivory);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
    }
    input[type="text"]::placeholder,
    input[type="password"]::placeholder {
      color: rgba(138,128,112,0.6);
      font-weight: 300;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--gold);
      background: #fff;
      box-shadow: 0 0 0 4px var(--gold-dim);
    }
    .field-input-wrap:has(input:focus) svg {
      stroke: var(--gold);
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .password-toggle svg {
      position: static;
      width: 16px;
      height: 16px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 1.6;
      transform: none;
    }
    .password-toggle:hover svg { stroke: var(--gold); }

    .form-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      font-size: 12px;
    }

    .remember-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .remember-wrap input[type="checkbox"] {
      appearance: none;
      width: 15px;
      height: 15px;
      border: 1px solid rgba(201,168,76,0.5);
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      transition: background 0.25s ease, border-color 0.25s ease;
      flex-shrink: 0;
    }
    .remember-wrap input[type="checkbox"]:checked {
      background: var(--gold);
      border-color: var(--gold);
    }
    .remember-wrap input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 4px;
      height: 8px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .forgot-link {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: color 0.2s ease;
    }
    .forgot-link:hover { color: var(--charcoal); }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), box-shadow 0.3s ease;
      box-shadow: 0 8px 24px rgba(201,168,76,0.28);
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(201,168,76,0.38);
    }
    .submit-btn:active {
      transform: translateY(0);
    }
    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
      transition: left 0.6s ease;
    }
    .submit-btn:hover::before { left: 100%; }

    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(179,73,47,0.07);
      border: 1px solid rgba(179,73,47,0.25);
      color: var(--error);
      font-size: 12px;
      font-weight: 400;
      padding: 11px 14px;
      border-radius: 10px;
      margin-bottom: 22px;
    }
    .error-msg.show {
      display: flex;
      animation: shake 0.4s ease;
    }
    .error-msg svg {
      width: 15px; height: 15px;
      stroke: var(--error);
      fill: none;
      stroke-width: 2;
      flex-shrink: 0;
    }

    .footer-note {
      text-align: center;
      margin-top: 34px;
      font-size: 10.5px;
      letter-spacing: 0.16em;
      color: rgba(138,128,112,0.55);
      text-transform: uppercase;
      animation: fadeInUp 0.7s 0.38s cubic-bezier(0.22,1,0.36,1) both;
    }
    .footer-note p + p { margin-top: 8px; }
  </style>
</head>
<body>

  <div class="portal-wrapper">

    <div class="header">
      <div class="system-eyebrow">Hospitality Management System</div>
      <h1 class="brand">QUOR<em>VA</em></h1>
      <div class="powered-by">Powered by <span>Peerloom Technologies</span></div>

      <div class="gold-divider">
        <span></span>
        <div class="diamond"></div>
        <span></span>
      </div>

      <!-- Dynamic: replace with actual property/hotel name at render time -->
      <div class="hotel-name" id="hotelName">LUXE Hotel</div>
    </div>

    <!-- ============================================================
         LOGIN FORM
         Front-end only for now. On submit:
           1. Send credentials to auth endpoint (to be built)
           2. Receive user role + assigned department/location
           3. Redirect:
              - role === 'staff'    -> department-specific dashboard
                                       (e.g. /departments/{departmentSlug}/dashboard.html)
              - role === 'director' -> director_dashboard.html
              - role === 'hotel_admin' -> hotel_admin.html
           4. Only 'admin' role can access user-creation tools,
              enforced server-side, not just hidden in UI.
         ============================================================ -->
    <form id="loginForm" novalidate>

      <div class="error-msg" id="errorMsg">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorText">Invalid username or password.</span>
      </div>

      <div class="field-group">
        <label class="field-label" for="username">Username</label>
        <div class="field-input-wrap">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="password">Password</label>
        <div class="field-input-wrap">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password">
            <svg viewBox="0 0 24 24" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="form-meta">
        <label class="remember-wrap">
          <input type="checkbox" id="remember" name="remember">
          Remember me
        </label>
        <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end;">
          <a href="#" class="forgot-link">Forgot password?</a>
          <a href="/signup.html" class="forgot-link">Create hotel account</a>
        </div>
      </div>

      <button type="submit" class="submit-btn">Sign In</button>

    </form>

    <div class="footer-note">
      <p>Private &nbsp;&bull;&nbsp; Authorised Access Only</p>
      <p>&copy; 2025 Peerloom Technologies. All rights reserved.</p>
    </div>

  </div>

  <script>
    // Password show/hide toggle
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeIcon.innerHTML = isPassword
        ? '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    });

    // ============================================================
    // LOGIN SUBMIT HANDLER
    // Authenticate users through the backend at /api/auth/login.
    // Expected response:
    //   { role: 'hotel_admin' | 'director' | 'staff', token, user, redirectUrl, dept }
    // The backend must provide secure hashed password validation.
    // ============================================================

    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const URL_HOTEL_ID = parseInt(new URLSearchParams(window.location.search).get('hotelId') || '', 10) || null;
    const API_BASE_URL =
      window.location.protocol === 'file:' || !window.location.hostname ||
      window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://localhost:3000'
        : 'https://hotelqrservices-production.up.railway.app';

    function appendHotelId(url) {
      if (!URL_HOTEL_ID) return url;
      const separator = url.includes('?') ? '&' : '?';
      return `${url}${separator}hotelId=${URL_HOTEL_ID}`;
    }

    function showError(message) {
      errorText.textContent = message;
      errorMsg.classList.remove('show');
      void errorMsg.offsetWidth; // restart animation
      errorMsg.classList.add('show');
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please enter both username and password.');
        return;
      }

      try {
        const res = await fetch(API_BASE_URL + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json().catch(() => ({}));

        if (res.ok && data.role === 'hotel_admin') {
          localStorage.setItem('hotelAdminToken', data.token);
          localStorage.setItem('hotelAdminUser', JSON.stringify(data.user || {}));
          window.location.href = data.redirectUrl || 'hotel_admin.html';
          return;
        }

        if (res.ok && data.role === 'director') {
          const name = data.user?.fullName || data.user?.username || username;
          const initials = name.split(/\s+/).filter(Boolean).slice(0, 2).map(part => part[0]).join('').toUpperCase();
          const params = new URLSearchParams({ name, initials });
          const targetUrl = appendHotelId((data.redirectUrl || 'director_dashboard.html') + '?' + params.toString());
          window.location.href = targetUrl;
          return;
        }

        // Backend was reached but responded with something other than a plain
        // "wrong credentials" (401) — surface the real error instead of silently
        // falling through to the demo-account check below, which just shows a
        // generic "invalid username or password" and hides the actual problem
        // (e.g. a 500 from a missing database table, a locked account, etc).
        if (res.status !== 401) {
          showError(data.error || `Server error (${res.status}). Please try again or contact your administrator.`);
          return;
        }
        showError('Invalid username or password.');
        return;
      } catch (err) {
        showError('Unable to reach authentication server. Please try again later.');
        return;
      }
    });
  </script>

</body>
</html>
