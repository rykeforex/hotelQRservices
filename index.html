<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUXE Hotel Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
    }
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center px-6 py-10">
  <div class="w-full max-w-3xl rounded-[2rem] border border-white/10 bg-slate-900/80 p-8 shadow-2xl shadow-black/20 backdrop-blur-xl animate-fade-in-up">
    <div class="mb-8 text-center animate-fade-in-up delay-100">
      <p class="text-sm uppercase tracking-[0.3em] text-amber-300">LUXE Hotel</p>
      <h1 class="mt-4 text-4xl font-bold text-white sm:text-5xl">Welcome</h1>
      <p class="mx-auto mt-4 max-w-2xl text-slate-400">Choose your role and continue to the appropriate portal.</p>
    </div>
    <div class="grid gap-4 sm:grid-cols-2">
      
      <a href="department_dashboard.html" class="rounded-[1.5rem] border border-white/10 bg-slate-800/90 p-6 text-left transition hover:-translate-y-1 hover:border-emerald-400/40 hover:bg-slate-800/100 animate-fade-in-up delay-200">
        <div class="text-sm uppercase tracking-[0.25em] text-emerald-300">Staff</div>
        <h2 class="mt-3 text-2xl font-semibold text-white">Staff Dashboard</h2>
        <p class="mt-2 text-slate-400">View and manage incoming requests for your department.</p>
      </a>
      <a href="director_dashboard.html" class="rounded-[1.5rem] border border-white/10 bg-slate-800/90 p-6 text-left transition hover:-translate-y-1 hover:border-sky-400/40 hover:bg-slate-800/100 animate-fade-in-up delay-200">
        <div class="text-sm uppercase tracking-[0.25em] text-sky-300">Manager</div>
        <h2 class="mt-3 text-2xl font-semibold text-white">Manager Portal</h2>
        <p class="mt-2 text-slate-400">Monitor overall hotel operations, metrics, and requests.</p>
      </a>
    </div>
  </div>
</body>
</html>
